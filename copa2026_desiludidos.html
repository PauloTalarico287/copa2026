<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026 — Desiludidos FC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow Condensed',sans-serif;background:#f0f2f0;color:#1a1a1a;padding:16px}
#copa{max-width:680px;margin:0 auto}
.copa-header{background:#1a5c2e;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.copa-title{color:#fff;display:flex;align-items:center;gap:12px}
.copa-logo{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4))}
.copa-title-text .sup{font-size:12px;letter-spacing:3px;opacity:.7;text-transform:uppercase}
.copa-title-text .main{font-size:26px;font-weight:800;letter-spacing:1px}
.copa-title-text .sub{font-size:13px;opacity:.6;margin-top:1px}
.view-btns{display:flex;gap:6px}
.view-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;transition:background .15s}
.view-btn.active,.view-btn:hover{background:rgba(255,255,255,.35)}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.filt-btn{background:#fff;border:1px solid #ccc;color:#555;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;transition:all .15s}
.filt-btn.active{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.day-block{margin-bottom:10px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden}
.day-header{background:#1a5c2e;color:#fff;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 12px}
.group-tag{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1a5c2e;padding:6px 12px 2px;opacity:.8}
.match-row{display:grid;grid-template-columns:40px 1fr auto 1fr;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid #f0f0f0}
.match-row:hover{background:#f9fdf9}
.m-time{font-size:15px;color:#888;font-weight:500}
.m-home{font-size:18px;font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-away{font-size:18px;font-weight:600;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-score{display:flex;align-items:center;gap:4px;justify-content:center}
.score-input{width:44px;text-align:center;font-size:22px;font-weight:700;font-family:"Barlow Condensed",sans-serif;padding:3px 2px;border-radius:6px;border:1.5px solid #ccc;background:#f5f5f5;color:#1a1a1a;-moz-appearance:textfield}
.score-input:focus{outline:none;border-color:#1a5c2e;background:#fff}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none}
.score-sep{font-size:14px;color:#aaa}
.simul-tag{font-size:9px;background:#d4a017;color:#fff;padding:1px 5px;border-radius:4px;font-weight:700;display:inline-block;margin-left:3px}
.phase-divider{background:#2c3e50;color:#fff;font-size:13px;font-weight:800;letter-spacing:3px;text-transform:uppercase;padding:8px 12px;border-radius:12px;margin:14px 0 6px}
.win{color:#1a7a3c}
.lose{color:#bbb;font-weight:400!important}
.grupo-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden}
.grupo-card-header{background:#1a5c2e;color:#fff;font-size:11px;font-weight:800;letter-spacing:3px;padding:7px 12px;text-transform:uppercase}
.grupo-table{width:100%;border-collapse:collapse;font-size:15px}
.grupo-table th{color:#999;font-size:12px;font-weight:600;text-transform:uppercase;padding:5px 8px;text-align:center;border-bottom:1px solid #eee}
.grupo-table th:first-child{text-align:left}
.grupo-table td{padding:6px 8px;text-align:center;border-top:1px solid #f0f0f0}
.grupo-table td:first-child{text-align:left;font-weight:600}
.grupo-table tr.qual{background:rgba(26,92,46,.07)}
.grupo-table .pts{font-weight:800;color:#1a5c2e}
.nota-qual{font-size:12px;color:#aaa;padding:5px 10px 7px}
.footer{text-align:center;margin-top:20px;padding:14px;font-size:13px;color:#888;border-top:1px solid #ddd;display:flex;align-items:center;justify-content:center;gap:8px}
.footer img{width:24px;height:24px;object-fit:contain}
</style>
</head>

function save(){try{localStorage.setItem("copa2026dfc",JSON.stringify(scores))}catch(e){}}

function buildTable(group){
  const teams=GROUPS[group],tbl={};
  teams.forEach(t=>{tbl[t]={j:0,v:0,e:0,d:0,gp:0,gc:0,pts:0}});
  MATCHES.filter(m=>m.group===group).forEach(m=>{
    const s=scores[m.id];if(!s||s.home===""||s.away==="")return;
    const h=parseInt(s.home),a=parseInt(s.away);if(isNaN(h)||isNaN(a))return;
    const ht=tbl[m.home],at=tbl[m.away];
    ht.j++;at.j++;ht.gp+=h;ht.gc+=a;at.gp+=a;at.gc+=h;
    if(h>a){ht.v++;ht.pts+=3;at.d++}
    else if(h<a){at.v++;at.pts+=3;ht.d++}
    else{ht.e++;at.e++;ht.pts++;at.pts++}
  });
  return Object.entries(tbl).sort((a,b)=>{
    if(b[1].pts!==a[1].pts)return b[1].pts-a[1].pts;
    return(b[1].gp-b[1].gc)-(a[1].gp-a[1].gc)||b[1].gp-a[1].gp;
  });
}

function matchHTML(m){
  const s=scores[m.id]||{home:"",away:""};
  const played=s.home!==""&&s.away!=="";
  const h=parseInt(s.home),a=parseInt(s.away);
  const hW=played&&h>a,aW=played&&a>h;
  const f=t=>`${FLAGS[t]||""} ${t}`;
  return `<div class="match-row">
    <div class="m-time">${m.time}${m.simul?` <span class="simul-tag">S</span>`:""}</div>
    <div class="m-home${hW?" win":played&&!hW?" lose":""}">${f(m.home)}</div>
    <div class="m-score">
      <input class="score-input" type="number" min="0" max="99" value="${s.home}" placeholder="–" data-id="${m.id}" data-side="home">
      <span class="score-sep">–</span>
      <input class="score-input" type="number" min="0" max="99" value="${s.away}" placeholder="–" data-id="${m.id}" data-side="away">
    </div>
    <div class="m-away${aW?" win":played&&!aW?" lose":""}">${f(m.away)}</div>
  </div>`;
}

function koMatchHTML(m){
  const s=scores[m.id]||{home:"",away:""};
  return `<div class="match-row">
    <div class="m-time">${m.time}</div>
    <div style="flex:1;text-align:center;color:#888;font-size:13px">${m.label} — ${m.city}</div>
    <div class="m-score">
      <input class="score-input" type="number" min="0" max="99" value="${s.home}" placeholder="–" data-id="${m.id}" data-side="home">
      <span class="score-sep">–</span>
      <input class="score-input" type="number" min="0" max="99" value="${s.away}" placeholder="–" data-id="${m.id}" data-side="away">
    </div>
    <div style="flex:1"></div>
  </div>`;
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  const byDate={};
  MATCHES.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m)});
  let html="";
  Object.keys(byDate).forEach(date=>{
    const ms=byDate[date];
    const show=activeFilter==="all"||ms.some(m=>m.group===activeFilter);
    if(!show)return;
    const filtered=activeFilter==="all"?ms:ms.filter(m=>m.group===activeFilter);
    html+=`<div class="day-block"><div class="day-header">${date}</div>`;
    let lastGroup="";
    filtered.forEach(m=>{
      if(m.group!==lastGroup){html+=`<div class="group-tag">Grupo ${m.group}</div>`;lastGroup=m.group;}
      html+=matchHTML(m);
    });
    html+="</div>";
  });
  if(activeFilter==="all"){
    KNOCKOUT.forEach(phase=>{
      const byD={};
      phase.matches.forEach(m=>{if(!byD[m.date])byD[m.date]=[];byD[m.date].push(m)});
      html+=`<div class="phase-divider">${phase.phase}</div>`;
      Object.keys(byD).forEach(d=>{
        html+=`<div class="day-block"><div class="day-header">${d}</div>`;
        byD[d].forEach(m=>{html+=koMatchHTML(m)});
        html+="</div>";
      });
    });
  }
  cal.innerHTML=html;
  cal.querySelectorAll(".score-input").forEach(inp=>{
    inp.addEventListener("input",function(){
      const id=this.dataset.id,side=this.dataset.side;
      if(!scores[id])scores[id]={home:"",away:""};
      scores[id][side]=this.value;
      save();
      renderCalendar();
      if(document.getElementById("view-grupos").style.display!=="none")renderGroups();
    });
  });
}

function renderGroups(){
  const grid=document.getElementById("grupos-grid");
  let html="";
  Object.keys(GROUPS).forEach(g=>{
    const rows=buildTable(g);
    html+=`<div class="grupo-card"><div class="grupo-card-header">Grupo ${g}</div>
      <table class="grupo-table">
        <thead><tr><th>Seleção</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>Pts</th></tr></thead>
        <tbody>`;
    rows.forEach(([team,s],i)=>{
      html+=`<tr class="${i<2?"qual":""}">
        <td>${FLAGS[team]||""} ${team}</td>
        <td>${s.j}</td><td>${s.v}</td><td>${s.e}</td><td>${s.d}</td>
        <td>${s.gp}</td><td>${s.gc}</td>
        <td class="pts">${s.pts}</td></tr>`;
    });
    html+=`</tbody></table><div class="nota-qual">🟢 Top 2 avançam</div></div>`;
  });
  grid.innerHTML=html;
}

function setView(v){

  document.getElementById("btn-grupos").classList.toggle("active",v==="grupos");
  if(v==="grupos")renderGroups();
}

function filterGroup(g){
  activeFilter=g;
  document.querySelectorAll(".filt-btn").forEach(b=>b.classList.remove("active"));
  const btn=document.getElementById("f-"+g);
  if(btn)btn.classList.add("active");
  renderCalendar();
}
